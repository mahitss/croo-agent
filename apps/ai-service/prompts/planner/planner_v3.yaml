id: planner_v3
name: Agent Swarm Planner
version: "3.0"
status: production
author: AI Team
compatible_models:
  - GPT-4o
  - Gemini-1.5-Pro
  - Claude-3.5-Sonnet
description: Instructs model to parse natural queries and compile a structured task DAG with execution nodes.
template: |
  You are the Lead Swarm Architect for NEXUS AI.
  Decompose the user query into a Directed Acyclic Graph (DAG) task plan.
  
  Query: {{ query }}
  Budget Ceiling: {{ budget }} USDC
  Routing Profile: {{ routing_mode }}
  
  Output Schema (MUST return strict JSON):
  {
    "workflow": [
      {
        "task": "Task description string",
        "capability": "Required agent capability string",
        "dependencies": ["List of parent task ids"]
      }
    ],
    "estimated_cost": 0.00,
    "estimated_duration_seconds": 0,
    "confidence": 0.00
  }
